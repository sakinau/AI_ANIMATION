scene_id: scene_customer_room_01
name: customer living room interaction pack
version: 0.1.0
format:
  width: 1920
  height: 1080
backgrounds:
  wide: backgrounds/wide.png
  medium: backgrounds/medium.png
  close_door: backgrounds/close_door.png
  close_table: backgrounds/close_table.png
  close_tv: backgrounds/close_tv.png
  close_window: backgrounds/close_window.png
  close_package: backgrounds/close_package.png
layers:
  background:
  - backgrounds/wide.png
  behind_character: []
  front_character:
  - layers/coffee_table_front.png
  - layers/sofa_front.png
  - layers/door_frame_front.png
  overlay: []
anchors:
  door_entry:
    x: 0.14
    y: 0.82
    scale: 0.82
    facing: right
  stand_left:
    x: 0.32
    y: 0.84
    scale: 0.86
    facing: right
  stand_right:
    x: 0.72
    y: 0.84
    scale: 0.86
    facing: left
  sofa_sit_left:
    x: 0.45
    y: 0.82
    scale: 0.78
    facing: front
  sofa_sit_right:
    x: 0.62
    y: 0.82
    scale: 0.78
    facing: front
  table_center:
    x: 0.5
    y: 0.76
    scale: 1.0
  table_food:
    x: 0.46
    y: 0.75
    scale: 1.0
  table_phone:
    x: 0.57
    y: 0.74
    scale: 1.0
  table_remote:
    x: 0.64
    y: 0.76
    scale: 1.0
  door_handle:
    x: 0.19
    y: 0.52
    scale: 1.0
  handoff_mid:
    x: 0.28
    y: 0.58
    scale: 1.0
  tv_center:
    x: 0.5
    y: 0.36
    scale: 1.0
  window_center:
    x: 0.8
    y: 0.3
    scale: 1.0
  package_corner:
    x: 0.86
    y: 0.78
    scale: 1.0
  close_insert_center:
    x: 0.5
    y: 0.5
    scale: 1.0
props:
  meal_bag:
    label: meal delivery bag
    variants:
      floor: props/meal_bag_floor.png
      hand: props/meal_bag_hand.png
      close: props/meal_bag_close.png
    default_anchor: handoff_mid
    pivot: center
    variant_scales:
      floor: 0.78
      hand: 0.58
      close: 1.0
  food_box:
    label: food box
    variants:
      closed: props/food_box_closed.png
      open: props/food_box_open.png
      close: props/food_box_close.png
    default_anchor: table_food
    pivot: center
    variant_scales:
      closed: 0.72
      open: 0.74
      close: 1.0
  phone:
    label: confirmation phone
    variants:
      table: props/phone_table.png
      close: props/phone_close.png
    default_anchor: table_phone
    pivot: center
    variant_scales:
      table: 0.58
      close: 0.95
  tv_popup:
    label: TV popup
    variants:
      warning: props/tv_popup_warning.png
    default_anchor: tv_center
    pivot: center
    variant_scales:
      warning: 0.78
  remote:
    label: remote control
    variants:
      table: props/remote_table.png
      hand: props/remote_hand.png
    default_anchor: table_remote
    pivot: center
    variant_scales:
      table: 0.5
      hand: 0.48
  key:
    label: door key
    variants:
      table: props/key_table.png
      hand: props/key_hand.png
    default_anchor: door_handle
    pivot: center
    variant_scales:
      table: 0.56
      hand: 0.52
  package:
    label: corner package
    variants:
      closed: props/package_closed.png
      open: props/package_open.png
    default_anchor: package_corner
    pivot: center
    variant_scales:
      closed: 0.82
      open: 0.82
  curtain:
    label: window curtain
    variants:
      open: props/curtain_open.png
    default_anchor: window_center
    pivot: center
    variant_scales:
      open: 1.0
supported_actions:
- stand
- enter_room
- door_handoff
- place_meal_on_table
- open_food_box
- confirm_delivery
- sit_sofa
- watch_tv_warning
- pick_remote
- unlock_door
- open_package
- inspect_window
- inspect_close
action_templates:
  enter_room:
    duration: 1.0
    actor_state_sequence:
    - offscreen
    - step_in
    - stand
    from_anchor: door_entry
  door_handoff:
    duration: 1.2
    prop: meal_bag
    prop_sequence:
    - time: 0.0
      variant: hand
      anchor: actor.hand_r
    - time: 0.7
      variant: hand
      anchor: handoff_mid
  place_meal_on_table:
    duration: 1.2
    prop: food_box
    prop_sequence:
    - time: 0.0
      variant: closed
      anchor: actor.hand_r
    - time: 0.65
      variant: closed
      anchor: table_food
  open_food_box:
    duration: 1.0
    prop: food_box
    prop_sequence:
    - time: 0.0
      variant: closed
      anchor: table_food
    - time: 0.55
      variant: open
      anchor: table_food
    - time: 0.8
      variant: close
      anchor: close_insert_center
  confirm_delivery:
    duration: 1.1
    prop: phone
    prop_sequence:
    - time: 0.0
      variant: table
      anchor: table_phone
    - time: 0.6
      variant: close
      anchor: close_insert_center
  sit_sofa:
    duration: 1.0
    actor_state_sequence:
    - stand
    - turn
    - sit
    target_anchor: sofa_sit_left
  watch_tv_warning:
    duration: 1.0
    prop: tv_popup
    prop_sequence:
    - time: 0.0
      variant: warning
      anchor: tv_center
      motion: pop_in
  pick_remote:
    duration: 0.9
    prop: remote
    prop_sequence:
    - time: 0.0
      variant: table
      anchor: table_remote
    - time: 0.55
      variant: hand
      anchor: actor.hand_r
  unlock_door:
    duration: 0.9
    prop: key
    prop_sequence:
    - time: 0.0
      variant: hand
      anchor: actor.hand_r
    - time: 0.55
      variant: table
      anchor: door_handle
  open_package:
    duration: 1.0
    prop: package
    prop_sequence:
    - time: 0.0
      variant: closed
      anchor: package_corner
    - time: 0.6
      variant: open
      anchor: package_corner
  inspect_window:
    duration: 1.0
    background: close_window
    prop: curtain
    prop_sequence:
    - time: 0.0
      variant: open
      anchor: close_insert_center
