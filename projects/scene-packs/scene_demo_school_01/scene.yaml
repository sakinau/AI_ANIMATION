    y: 0.79
    scale: 0.82
    facing: right
  desk_center:
    x: 0.51
    y: 0.61
    scale: 1.0
  desk_phone:
    x: 0.58
    y: 0.55
    scale: 1.0
  desk_book:
    x: 0.47
