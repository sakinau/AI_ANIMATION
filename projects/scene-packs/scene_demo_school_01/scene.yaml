    y: 0.82
    scale: 0.78
    facing: left
  door_handle:
    x: 0.8
    y: 0.52
    scale: 1.0
  desk_note:
    x: 0.405
    y: 0.555
    scale: 1.0
  desk_key:
    x: 0.705
    y: 0.565
    scale: 1.0
  desk_chalk:
    x: 0.355
    y: 0.58
    scale: 1.0
  floor_delivery_bag:
    x: 0.245
    y: 0.865
    scale: 0.9
  handoff_mid:
    x: 0.48
    y: 0.55
    scale: 1.0
  close_insert_center:
    x: 0.5
