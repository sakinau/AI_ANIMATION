props:
  phone:
    label: 手机
    variants:
      table: props/phone_table.png
      hand: props/phone_hand.png
      close: props/phone_close.png
    default_anchor: desk_phone
    pivot: center
    variant_scales:
      table: 1.0
      hand: 1.0
      close: 1.0
  book:
    label: 书
    variants:
      closed: props/book_closed.png
      open: props/book_open.png
      hand: props/book_hand.png
      close: props/book_close.png
    default_anchor: desk_book
    pivot: center
    variant_scales:
      closed: 1.0
      open: 1.0
      hand: 0.62
      close: 0.92
  cup:
    label: 杯子
    variants:
      table: props/cup_table.png
      hand: props/cup_hand.png
      close: props/cup_close.png
    default_anchor: desk_cup
    pivot: center
    variant_scales:
      table: 1.0
      hand: 1.0
      close: 0.82
  cup_comfy:
    label: Comfy杯子
    variants:
      table: props/cup_comfy_table.png
    pivot: center
    default_anchor: desk_cup
  book_comfy:
    label: Comfy书本
    variants:
      closed: props/book_comfy_closed.png
    pivot: center
    default_anchor: desk_book
  phone_comfy:
    label: Comfy手机
    variants:
      table: props/phone_comfy_table.png
    pivot: center
    default_anchor: desk_phone
  paper_note:
    label: 纸条
    variants:
      table: props/paper_note_table.png
      hand: props/paper_note_hand.png
      close: props/paper_note_close.png
    default_anchor: desk_note
    pivot: center
    variant_scales:
      table: 0.58
      hand: 0.58
      close: 0.9
  delivery_bag:
    label: 外卖袋
    variants:
      floor: props/delivery_bag_floor.png
      hand: props/delivery_bag_hand.png
    default_anchor: floor_delivery_bag
    pivot: center
    variant_scales:
      floor: 0.72
      hand: 0.55
  key:
    label: 钥匙
    variants:
      table: props/key_table.png
      hand: props/key_hand.png
    default_anchor: desk_key
    pivot: center
    variant_scales:
      table: 0.58
      hand: 0.55
  chalk:
    label: 粉笔
    variants:
      table: props/chalk_table.png
      hand: props/chalk_hand.png
    default_anchor: desk_chalk
    pivot: center
    variant_scales:
      table: 0.62
      hand: 0.58
  ui_popup:
    label: UI弹窗
    variants:
      order: props/order_popup.png
      warning: props/warning_popup.png
    default_anchor: ui_center
    pivot: center
    variant_scales:
      order: 0.82
      warning: 0.82
  dialogue_bubble:
    label: 对话气泡
    variants:
      left: props/dialogue_bubble_left.png
      right: props/dialogue_bubble_right.png
    default_anchor: bubble_left
    pivot: center
    variant_scales:
      left: 0.72
      right: 0.72
  reaction_mark:
    label: 反应符号
    variants:
      exclaim: props/reaction_exclaim.png
      question: props/reaction_question.png
      speed: props/speed_lines.png
    default_anchor: reaction_left
    pivot: center
    variant_scales:
      exclaim: 0.65
      question: 0.65
      speed: 1.2
  environment_insert:
    label: 环境插入图
    variants:
      blackboard: props/blackboard_insert.png
      door: props/door_insert.png
    default_anchor: close_insert_center
    pivot: center
    variant_scales:
      blackboard: 0.92
      door: 0.82
supported_actions:
- stand
- sit
- pick_up
- put_down
- hand_over
- enter_from_door
- inspect_close
- read_note
- open_book
- drink
- unlock_door
- deliver_bag
- show_closeup
- show_order_popup
- show_warning_popup
- show_dialogue
- reaction_pop
- speed_emphasis
- inspect_blackboard
- inspect_door
action_templates:
  sit:
    duration: 1.0
    actor_state_sequence:
    - stand
    - bend
    - sit
    target_anchor: sit_chair_1
    requires_front_layers:
    - chair_front
  pick_up:
    duration: 1.2
    actor_state_sequence:
    - reach
    - grab
    - hold
    default_prop: phone
    prop_sequence:
    - time: 0.0
      variant: table
      anchor: '{prop.default_anchor}'
    - time: 0.7
      variant: hand
      anchor: actor.hand_r
  enter_from_door:
    duration: 1.4
    actor_state_sequence:
    - offscreen
    - walk
    - stand
    from_anchor: door_entry
    requires_front_layers:
    - door_frame_front
  hand_over:
    duration: 1.0
    actor_state_sequence:
    - hold
    - extend
    - release
    from_anchor: actor.hand_r
    to_anchor: handoff_mid
    prop_sequence:
    - time: 0.0
      variant: hand
      anchor: actor.hand_r
    - time: 0.65
      variant: hand
      anchor: handoff_mid
  inspect_close:
    duration: 1.4
    camera: cut_to_close_insert
    prop_anchor: close_insert_center
    preferred_variants:
    - close
    - open
    - table
  read_note:
    duration: 1.6
    actor_state_sequence:
    - reach
    - hold
    - read
    prop: paper_note
    prop_sequence:
    - time: 0.0
      variant: table
      anchor: desk_note
    - time: 0.55
      variant: hand
      anchor: actor.hand_r
    - time: 1.0
      variant: close
      anchor: close_insert_center
  open_book:
    duration: 1.8
    actor_state_sequence:
    - reach
    - open
    - read
    prop: book
    prop_sequence:
    - time: 0.0
      variant: closed
      anchor: desk_book
    - time: 0.6
      variant: hand
      anchor: actor.hand_r
    - time: 1.15
      variant: close
      anchor: close_insert_center
  drink:
    duration: 1.2
    actor_state_sequence:
    - reach
    - lift
    - sip
    prop: cup
    prop_sequence:
    - time: 0.0
      variant: table
      anchor: desk_cup
    - time: 0.55
      variant: hand
      anchor: actor.hand_r
  unlock_door:
    duration: 1.4
    actor_state_sequence:
    - hold
    - reach
    - turn_key
    prop: key
    target_anchor: door_handle
    prop_sequence:
    - time: 0.0
      variant: hand
      anchor: actor.hand_r
    - time: 0.9
      variant: hand
      anchor: door_handle
  deliver_bag:
    duration: 1.5
    actor_state_sequence:
    - carry
    - lower
    - release
    prop: delivery_bag
    prop_sequence:
    - time: 0.0
      variant: hand
      anchor: actor.hand_r
    - time: 1.0
      variant: floor
      anchor: floor_delivery_bag
  show_order_popup:
    duration: 1.2
    camera: hold_medium
    prop: ui_popup
    prop_sequence:
    - time: 0.0
      variant: order
      anchor: ui_center
    - time: 0.18
      variant: order
      anchor: ui_center
      motion: pop_in
  show_warning_popup:
    duration: 1.0
    camera: shake_short
    prop: ui_popup
    prop_sequence:
    - time: 0.0
      variant: warning
      anchor: ui_center
      motion: pop_in
  show_dialogue:
    duration: 1.4
    prop: dialogue_bubble
    prop_sequence:
    - time: 0.0
      variant: left
      anchor: bubble_left
    - time: 0.7
      variant: right
      anchor: bubble_right
  reaction_pop:
    duration: 0.7
    prop: reaction_mark
    prop_sequence:
    - time: 0.0
      variant: exclaim
      anchor: reaction_left
      motion: pop
    - time: 0.35
      variant: question
      anchor: reaction_right
      motion: pop
  speed_emphasis:
    duration: 0.6
    prop: reaction_mark
    prop_sequence:
    - time: 0.0
      variant: speed
      anchor: ui_center
      motion: slide
  inspect_blackboard:
    duration: 1.4
    background: close_blackboard
    prop: environment_insert
    prop_sequence:
    - time: 0.0
      variant: blackboard
      anchor: blackboard_center
  inspect_door:
    duration: 1.2
    background: close_door
    prop: environment_insert
    prop_sequence:
    - time: 0.0
      variant: door
      anchor: door_close_center
