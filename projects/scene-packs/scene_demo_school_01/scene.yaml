scene_id: scene_demo_school_01
name: 学校走廊交互样板
version: 0.1.0
format:
  width: 1920
  height: 1080
backgrounds:
  wide: backgrounds/wide.png
  medium: backgrounds/medium.png
  close_desk: backgrounds/close_desk.png
  comfy_school_wide: backgrounds/comfy_school_wide.png
  stylelock_school_wide_055: backgrounds/stylelock_school_wide_055.png
layers:
  background:
  - backgrounds/wide.png
  behind_character:
  - layers/chair_back.png
  - layers/desk_back.png
  front_character:
  - layers/chair_front.png
  - layers/desk_front.png
  - layers/door_frame_front.png
  overlay: []
anchors:
  stand_left:
    x: 0.28
    y: 0.82
    scale: 0.86
    facing: right
  stand_right:
    x: 0.66
    y: 0.82
    scale: 0.84
    facing: left
  sit_chair_1:
    x: 0.44
    y: 0.79
    scale: 0.82
    facing: right
  desk_center:
    x: 0.51
    y: 0.61
    scale: 1.0
  desk_phone:
    x: 0.58
    y: 0.55
    scale: 1.0
  desk_book:
    x: 0.47
    y: 0.56
    scale: 1.0
  desk_cup:
    x: 0.64
    y: 0.56
    scale: 1.0
  door_entry:
    x: 0.83
    y: 0.82
    scale: 0.78
    facing: left
  door_handle:
    x: 0.8
    y: 0.52
    scale: 1.0
  desk_note:
    x: 0.405
    y: 0.555
    scale: 1.0
  desk_key:
    x: 0.705
    y: 0.565
    scale: 1.0
  desk_chalk:
    x: 0.355
    y: 0.58
    scale: 1.0
  floor_delivery_bag:
    x: 0.245
    y: 0.865
    scale: 0.9
  handoff_mid:
    x: 0.48
    y: 0.55
    scale: 1.0
  close_insert_center:
    x: 0.5
    y: 0.5
    scale: 1.0
props:
  phone:
    label: 手机
    variants:
      table: props/phone_table.png
      hand: props/phone_hand.png
      close: props/phone_close.png
    default_anchor: desk_phone
    pivot: center
    variant_scales:
      table: 1.0
      hand: 1.0
      close: 1.0
  book:
    label: 书
    variants:
      closed: props/book_closed.png
      open: props/book_open.png
      hand: props/book_hand.png
      close: props/book_close.png
    default_anchor: desk_book
    pivot: center
    variant_scales:
      closed: 1.0
      open: 1.0
      hand: 0.62
      close: 0.92
  cup:
    label: 杯子
    variants:
      table: props/cup_table.png
      hand: props/cup_hand.png
      close: props/cup_close.png
    default_anchor: desk_cup
    pivot: center
    variant_scales:
      table: 1.0
      hand: 1.0
      close: 0.82
  cup_comfy:
    label: Comfy杯子
    variants:
      table: props/cup_comfy_table.png
    pivot: center
    default_anchor: desk_cup
  book_comfy:
    label: Comfy书本
    variants:
      closed: props/book_comfy_closed.png
    pivot: center
    default_anchor: desk_book
  phone_comfy:
    label: Comfy手机
    variants:
      table: props/phone_comfy_table.png
    pivot: center
    default_anchor: desk_phone
  paper_note:
    label: 纸条
    variants:
      table: props/paper_note_table.png
      hand: props/paper_note_hand.png
      close: props/paper_note_close.png
    default_anchor: desk_note
    pivot: center
    variant_scales:
      table: 0.58
      hand: 0.58
      close: 0.9
  delivery_bag:
    label: 外卖袋
    variants:
      floor: props/delivery_bag_floor.png
      hand: props/delivery_bag_hand.png
    default_anchor: floor_delivery_bag
    pivot: center
    variant_scales:
      floor: 0.72
      hand: 0.55
  key:
    label: 钥匙
    variants:
      table: props/key_table.png
      hand: props/key_hand.png
    default_anchor: desk_key
    pivot: center
    variant_scales:
      table: 0.58
      hand: 0.55
  chalk:
    label: 粉笔
    variants:
      table: props/chalk_table.png
      hand: props/chalk_hand.png
    default_anchor: desk_chalk
    pivot: center
    variant_scales:
      table: 0.62
      hand: 0.58
supported_actions:
- stand
- sit
- pick_up
- put_down
- hand_over
- enter_from_door
- inspect_close
- read_note
- open_book
- drink
- unlock_door
- deliver_bag
- show_closeup
action_templates:
  sit:
    duration: 1.0
    actor_state_sequence:
    - stand
    - bend
    - sit
    target_anchor: sit_chair_1
    requires_front_layers:
    - chair_front
  pick_up:
    duration: 1.2
    actor_state_sequence:
    - reach
    - grab
    - hold
    default_prop: phone
    prop_sequence:
    - time: 0.0
      variant: table
      anchor: '{prop.default_anchor}'
    - time: 0.7
      variant: hand
      anchor: actor.hand_r
  enter_from_door:
    duration: 1.4
    actor_state_sequence:
    - offscreen
    - walk
    - stand
    from_anchor: door_entry
    requires_front_layers:
    - door_frame_front
  hand_over:
    duration: 1.0
    actor_state_sequence:
    - hold
    - extend
    - release
    from_anchor: actor.hand_r
    to_anchor: handoff_mid
    prop_sequence:
    - time: 0.0
      variant: hand
      anchor: actor.hand_r
    - time: 0.65
      variant: hand
      anchor: handoff_mid
  inspect_close:
    duration: 1.4
    camera: cut_to_close_insert
    prop_anchor: close_insert_center
    preferred_variants:
    - close
    - open
    - table
  read_note:
    duration: 1.6
    actor_state_sequence:
    - reach
    - hold
    - read
    prop: paper_note
    prop_sequence:
    - time: 0.0
      variant: table
      anchor: desk_note
    - time: 0.55
      variant: hand
      anchor: actor.hand_r
    - time: 1.0
      variant: close
      anchor: close_insert_center
  open_book:
    duration: 1.8
    actor_state_sequence:
    - reach
    - open
    - read
    prop: book
    prop_sequence:
    - time: 0.0
      variant: closed
      anchor: desk_book
    - time: 0.6
      variant: hand
      anchor: actor.hand_r
    - time: 1.15
      variant: close
      anchor: close_insert_center
  drink:
    duration: 1.2
    actor_state_sequence:
    - reach
    - lift
    - sip
    prop: cup
    prop_sequence:
    - time: 0.0
      variant: table
      anchor: desk_cup
    - time: 0.55
      variant: hand
      anchor: actor.hand_r
  unlock_door:
    duration: 1.4
    actor_state_sequence:
    - hold
    - reach
    - turn_key
    prop: key
    target_anchor: door_handle
    prop_sequence:
    - time: 0.0
      variant: hand
      anchor: actor.hand_r
    - time: 0.9
      variant: hand
      anchor: door_handle
  deliver_bag:
    duration: 1.5
    actor_state_sequence:
    - carry
    - lower
    - release
    prop: delivery_bag
    prop_sequence:
    - time: 0.0
      variant: hand
      anchor: actor.hand_r
    - time: 1.0
      variant: floor
      anchor: floor_delivery_bag
