    scale: 0.85
  bubble_left:
    x: 0.33
    y: 0.28
    scale: 1.0
  bubble_right:
    x: 0.67
    y: 0.28
    scale: 1.0
  reaction_left:
    x: 0.31
    y: 0.24
    scale: 1.0
  reaction_right:
    x: 0.69
