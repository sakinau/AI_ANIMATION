source_strategy:
  ai_generated:
    best_for:
      - 主角
      - 魔王
      - 魔王城背景
      - 核心道具
      - 统一风格表情
    rule: "生成后拆层并登记为 AI Generated，不直接声称可商用，按使用平台条款复核。"
  free_assets:
    best_for:
      - 通用音效
      - UI beep
      - whoosh
      - 烟尘
      - 速度线
      - 临时背景参考
    rule: "授权不清楚的素材只能 Candidate，不进入正式工程。"
  paid_assets:
    best_for:
      - AE 特效包
      - 商用音效库
      - 漫画转场包
      - 免版税音乐
    rule: "优先购买可复用、授权明确、支持商用的生产型资产。"
chrome_search_keywords:
  characters:
    - "沙雕动画 外卖员 角色设计"
    - "delivery guy cartoon character png"
    - "demon king cartoon character png"
    - "chibi demon king transparent png"
  backgrounds:
    - "魔王城 大殿 背景 插画"
    - "fantasy demon castle interior background"
    - "dark throne room cartoon background"
    - "magic portal transparent png"
  ui:
    - "外卖 app UI 弹窗 素材"
    - "delivery app UI vector"
    - "RPG UI popup transparent"
    - "countdown timer UI png"
  fx:
    - "magic portal effect transparent"
    - "anime speed lines png transparent"
    - "cartoon explosion smoke png"
    - "manga impact effect png"
  audio:
    - "free whoosh sound effect commercial use"
    - "free magic spell sound effect royalty free"
    - "cartoon impact sound effect royalty free"
